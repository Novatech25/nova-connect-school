name: Room Assignment Automation

on:
  schedule:
    # Calcul quotidien à 18h00 UTC (secours si Vercel Cron est down)
    - cron: "0 18 * * *"
    # Nettoyage hebdomadaire des anciennes attributions (dimanche 3h00 UTC)
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode execution"
        required: true
        default: "calculate"
        type: choice
        options:
          - calculate
          - cleanup

# NOTE: Les notifications T-60 / T-15 sont gérées par Vercel Cron (chaque minute)
# via /api/cron/room-assignment-notify. Ce workflow GitHub Actions gère uniquement
# le calcul quotidien (secours) et le nettoyage hebdomadaire.

jobs:
  # ============================================================
  # JOB 1: Calcul des attributions pour TOUTES les écoles
  # (Secours — Vercel Cron /api/cron/room-assignment-calculate est prioritaire)
  # ============================================================
  calculate-assignments:
    runs-on: ubuntu-latest
    if: |
      (github.event.schedule == '0 18 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'calculate')

    steps:
      - name: Calculer les attributions pour toutes les écoles (J+1)
        run: |
          SESSION_DATE=$(date -d '+1 day' +%Y-%m-%d)
          echo "📅 Date de calcul: $SESSION_DATE"
          echo "🔄 Lancement du calcul multi-écoles via RPC Postgres..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/calculate_room_assignments_all_schools_rpc" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"p_session_date\": \"$SESSION_DATE\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "📊 Résultat (HTTP $HTTP_CODE):"
          echo "$BODY" | jq .

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Erreur HTTP: $HTTP_CODE"
            exit 1
          fi

          SCHOOLS_FAILED=$(echo "$BODY" | jq -r '.schools_failed // 0')
          SCHOOLS_PROCESSED=$(echo "$BODY" | jq -r '.schools_processed // 0')

          echo "✅ $SCHOOLS_PROCESSED école(s) traitée(s)"
          if [ "$SCHOOLS_FAILED" -gt 0 ]; then
            echo "⚠️ $SCHOOLS_FAILED école(s) en erreur — vérifier les logs Supabase"
            exit 1
          fi

  # ============================================================
  # JOB 2: Nettoyage hebdomadaire des anciennes attributions
  # ============================================================
  cleanup:
    runs-on: ubuntu-latest
    if: |
      (github.event.schedule == '0 3 * * 0') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'cleanup')

    steps:
      - name: Nettoyer les attributions de plus de 30 jours
        run: |
          echo "🧹 Nettoyage des attributions (draft/cancelled) de plus de 30 jours..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/cleanup_old_room_assignments_all_schools_rpc" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"p_days_to_keep": 30}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "📊 Résultat (HTTP $HTTP_CODE):"
          echo "$BODY" | jq .

          DELETED=$(echo "$BODY" | jq -r '.deleted_count // 0')
          echo "✅ $DELETED entrée(s) supprimée(s)"
