# ==============================================
# NovaConnect Gateway - Configuration Nginx
# Avec support HTTPS et Let's Encrypt
# ==============================================
#
# Installation:
#   1. Copier ce fichier dans /etc/nginx/sites-available/
#   2. Remplacer gateway.your-domain.com par votre domaine
#   3. Créer le lien symbolique:
#      sudo ln -s /etc/nginx/sites-available/novaconnect-gateway /etc/nginx/sites-enabled/
#   4. Tester la configuration: sudo nginx -t
#   5. Recharger Nginx: sudo systemctl reload nginx
#   6. Installer le certificat SSL avec certbot
# ==============================================

# Upstream configuration
upstream novaconnect_gateway {
    server 127.0.0.1:3001;
    keepalive 64;
}

# HTTP Server - Rediriger vers HTTPS
server {
    listen 80;
    listen [::]:80;

    server_name gateway.your-domain.com;

    # Permettre à Let's Encrypt de valider le domaine
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Rediriger tout le trafic vers HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name gateway.your-domain.com;

    # ============================================
    # Configuration SSL
    # ============================================

    # Certificats Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/gateway.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gateway.your-domain.com/privkey.pem;

    # Configuration SSL moderne
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # Session SSL
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ============================================
    # Security Headers
    # ============================================

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ============================================
    # Logging
    # ============================================

    access_log /var/log/nginx/novaconnect-gateway-access.log;
    error_log /var/log/nginx/novaconnect-gateway-error.log;

    # ============================================
    # Proxy Configuration
    # ============================================

    # API endpoints
    location /api/ {
        proxy_pass http://novaconnect_gateway;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;

        # Rate limiting (optionnel)
        limit_req zone=api_limit burst=20 nodelay;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://novaconnect_gateway/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Admin interface
    location /admin {
        proxy_pass http://novaconnect_gateway/admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support (si nécessaire)
    location /ws {
        proxy_pass http://novaconnect_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # Favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Robots.txt
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
